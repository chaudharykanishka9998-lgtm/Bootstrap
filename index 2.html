<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="index 2.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container py-4">
        <h2>Registration Form</h2>
    <div class="mb-3">
        <label class="form-label"><b>Name</b></label>
        <input type="text" class="form-control">
    </div>
     <div class="mb-3">
     <label class="form-label"><b>Email</b></label>
     <input type="email" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label"><b>Password</b></label>
        <input type="password" class="form-control">
        <small class="form-text text-muted">
            Must be 8 to 20 characters
             with No special character
        </small>
    </div>
    <div class="mb-3">
        <label class="form-label"><b>Country</b></label>
        <select class="form-select">
        <option>India</option>
        <option>United States</option>
        <option>Russia</option>
        <option>Bangladesh</option>
        <option>Japan</option>
        </select>
    </div>
    <div class="mb-3">
     <label class="form-label"><b>Message</b></label>
     <textarea class="form-control" rows="3"></textarea>
    </div>
    <div class="mb-3">
     <label class="form-label"><b>Experience Level</b></label>
     <input type="range" class="form-range" min="0" max="100">
    </div>
    <label class="form-label"><b>Skills</b></label>
    <div class="form-check">
        <input type="checkbox" class="form-check-input" 
        id="Responsive Web Design Check">
        <label class="form-check-label"
        for="Responsive Web Design Check">Responsive Web Design</label>
    </div>
    <div class="form-check">
        <input type="checkbox" class="form-check-input" 
        id="Front-End Development Check">
        <label class="form-check-label"
        for="Front-End Development Check">Front-End Development</label>
        </div>
        <div class="form-check">
        <input type="checkbox" class="form-check-input" 
        id="JavaScript Check">
        <label class="form-check-label"
        for="JavaScriptCheck">JavaScript</label>
        </div>
        <div class="form-check">
        <input type="checkbox" class="form-check-input" 
        id="UI Design Check">
        <label class="form-check-label"
        for="UI Design Check">UI Design</label>
        </div>
        <label class="form-label"><b>Gender</b></label>
        <div class="form-check">
         <input type="radio" name="gender" class="form-check-input"
            id="m">
         <label class="form-check-label" for="m">Male</label>
        </div>
        <div class="form-check">
         <input type="radio" name="gender" class="form-check-input"
            id="f">
         <label class="form-check-label" for="f">Female</label>
        </div>
        <br>
        <div class="form-check form-switch">
            <input type="checkbox" role="switch"
            class="form-check-input" id="notif">
        <label class="form-check-label"
        for="notif"><b>Email Alerts</b></label>    
        </div>
        <div class="mb-3">
           <label class="form-label">
            <b>Upload Resume</b>
           </label> 
           <input type="file" class="form-control">
        </div>
        <button type="Submit"
        class="btn btn-primary">Submit</button>
    </div>
</body>
</html>
